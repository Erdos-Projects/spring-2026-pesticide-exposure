<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
  <style>
    .title { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; }
    .subtitle { font: 400 13px Arial, Helvetica, sans-serif; fill: #374151; }
    .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
    .hdr { font: 700 16px Arial, Helvetica, sans-serif; fill: #111827; }
    .txt { font: 400 13px Arial, Helvetica, sans-serif; fill: #111827; }
    .muted { fill: #6b7280; }
    .badge { font: 700 12px Arial, Helvetica, sans-serif; fill: #111827; }
    .ok { fill: #10b981; }
    .warn { fill: #f59e0b; }
    .strokeOk { stroke: #10b981; }
    .strokeWarn { stroke: #f59e0b; }
    .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #374151; }
  </style>

  <!-- Header -->
  <text x="40" y="48" class="title">Equity / stability summary (Final validation, Full pesticides raw)</text>
  <text x="40" y="72" class="subtitle">Validated pattern review across cross-validation (OOF) and final validation holdout (external) for XGBoost (tuned).</text>

  <!-- Left big card: Asthma -->
  <rect x="40" y="105" width="440" height="415" rx="14" class="card"/>
  <text x="68" y="136" class="hdr">Asthma (CASTHMA)</text>
  <text x="68" y="160" class="small muted">Goal: detect large error differences across key groups</text>

  <!-- Poverty -->
  <rect x="68" y="190" width="370" height="70" rx="12" class="card" fill="#f8fafc"/>
  <circle cx="95" cy="225" r="10" class="ok"/>
  <text x="95" y="230" text-anchor="middle" class="badge" fill="#ffffff">OK</text>
  <text x="115" y="222" class="txt">Errors broadly stable by poverty group</text>
  <text x="115" y="244" class="small muted">Similar MAE/RMSE trends; no major gap observed</text>

  <!-- Urban-rural -->
  <rect x="68" y="270" width="370" height="70" rx="12" class="card" fill="#f8fafc"/>
  <circle cx="95" cy="305" r="10" class="ok"/>
  <text x="95" y="310" text-anchor="middle" class="badge" fill="#ffffff">OK</text>
  <text x="115" y="302" class="txt">Errors broadly stable by urban-rural group</text>
  <text x="115" y="324" class="small muted">Predicted accuracy does not systematically drift</text>

  <!-- Majority-BIPOC -->
  <rect x="68" y="350" width="370" height="115" rx="12" class="card" fill="#fff7ed"/>
  <circle cx="95" cy="395" r="10" class="warn"/>
  <text x="95" y="400" text-anchor="middle" class="badge" fill="#111827">MON</text>
  <text x="115" y="392" class="txt">Higher asthma error in majority-BIPOC counties</text>
  <text x="115" y="415" class="small muted">Action: monitor + investigate, then improve fairness/robustness</text>
  <text x="115" y="438" class="small muted">Example next steps: recalibration, feature audit, or subgroup-aware training</text>

  <!-- Right big card: COPD -->
  <rect x="520" y="105" width="420" height="415" rx="14" class="card"/>
  <text x="548" y="136" class="hdr">COPD (COPD)</text>
  <text x="548" y="160" class="small muted">Goal: detect large error differences across key groups</text>

  <!-- Poverty -->
  <rect x="548" y="190" width="350" height="70" rx="12" class="card" fill="#f8fafc"/>
  <circle cx="575" cy="225" r="10" class="ok"/>
  <text x="575" y="230" text-anchor="middle" class="badge" fill="#ffffff">OK</text>
  <text x="595" y="222" class="txt">Errors broadly stable by poverty group</text>
  <text x="595" y="244" class="small muted">No major disparity flagged in review</text>

  <!-- Urban-rural -->
  <rect x="548" y="270" width="350" height="70" rx="12" class="card" fill="#f8fafc"/>
  <circle cx="575" cy="305" r="10" class="ok"/>
  <text x="575" y="310" text-anchor="middle" class="badge" fill="#ffffff">OK</text>
  <text x="595" y="302" class="txt">Errors broadly stable by urban-rural group</text>
  <text x="595" y="324" class="small muted">Accuracy trends are consistent across groups</text>

  <!-- Majority-BIPOC -->
  <rect x="548" y="350" width="350" height="115" rx="12" class="card" fill="#ffffff"/>
  <text x="595" y="392" class="txt">Majority-BIPOC gap</text>
  <text x="595" y="415" class="small muted">Not specifically flagged in the provided summary.</text>
  <text x="595" y="438" class="small muted">If needed, run the same subgroup error analysis for COPD.</text>

  <!-- Footer note -->
  <rect x="40" y="530" width="900" height="15" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="52" y="541" class="small muted">Note: this graphic summarizes the equity check conclusions provided; attach the underlying subgroup metric table/plots for reporting.</text>
</svg>

